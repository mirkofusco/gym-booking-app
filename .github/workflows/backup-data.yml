name: Backup bookings data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create backup folder
        run: mkdir -p backups

      - name: Backup bookings.json
        run: |
          TS=$(date +'%Y-%m-%d_%H-%M-%S')
          cp data/bookings.json backups/bookings_$TS.json

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "backup: bookings data $(date +'%Y-%m-%d %H:%M:%S')" || echo "Nessuna modifica"
          git push
